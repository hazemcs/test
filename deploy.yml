name: Deploy Website

on:
  push:
    branches:
      - main

jobs:

  deploy:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Image
        run: |
          docker build \
          -t ${{ secrets.DOCKER_USERNAME }}/hazem-demo:v1 .

      - name: Push Image
        run: |
          docker push \
          ${{ secrets.DOCKER_USERNAME }}/hazem-demo:v1

      - name: Deploy To EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |

            docker pull ${{ secrets.DOCKER_USERNAME }}/hazem-demo:v1

            docker stop website || true

            docker rm website || true

            docker run -d \
              --name website \
              -p 80:80 \
              ${{ secrets.DOCKER_USERNAME }}/hazem-demo:v1